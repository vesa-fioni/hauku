<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png">
<title>Hauku - Metsästäjä</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body, #map { height: 100%; margin: 0; padding: 0; }
  #status {
    position: absolute; top: 8px; left: 8px; z-index: 1000;
    background: rgba(255,255,255,0.9); padding: 6px 10px; border-radius: 6px;
    font-family: sans-serif; font-size: 13px; max-width: 80%;
  }
  #topbar {
    position: absolute; top: 8px; right: 8px; z-index: 1000;
    background: linear-gradient(135deg, #1b4332, #10291f);
    color: white; padding: 8px 14px; border-radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
<div id="topbar">Metsästäjämoodi</div>
<div id="status">Ladataan...</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>window.PACK_ROLE = "hunter";</script>
<script src="shared.js"></script>
</body>
</html>
