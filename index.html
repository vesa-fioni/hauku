<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png?v=2">
<title>Hauku</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --forest: #1b4332;
    --forest-dark: #10291f;
    --orange: #f97316;
    --orange-dark: #ea6a0a;
    --cream: #f7f5f0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--cream);
    color: #222;
  }

  /* ---- Onboarding / asetukset ---- */
  #onboarding, .overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: var(--cream);
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 24px 16px 40px;
  }
  .overlay { background: rgba(0,0,0,0.5); align-items: center; }
  .overlay .onboard-card { box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

  .onboard-card {
    width: 100%; max-width: 420px;
    background: var(--cream);
  }
  .overlay .onboard-card { background: white; border-radius: 16px; padding: 20px; }

  .onboard-logo { width: 100%; max-width: 300px; display: block; margin: 0 auto 6px; }
  .onboard-tagline {
    text-align: center; color: var(--forest); font-weight: 600;
    font-size: 14px; margin: 0 0 18px;
  }

  .form-block {
    background: white; border-radius: 14px; padding: 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .overlay .form-block { box-shadow: none; padding: 0; margin-top: 4px; }

  .form-block label {
    display: block; font-size: 12px; color: #555; margin: 12px 0 4px;
  }
  .form-block label:first-child { margin-top: 0; }
  .form-block input {
    width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px;
  }

  .role-toggle { display: flex; gap: 10px; }
  .role-option {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px;
    cursor: pointer;
  }

  .hint { font-size: 12px; color: #888; margin: 6px 0; }
  .hint-ok { color: #16a34a; }

  .btn {
    width: 100%; padding: 14px; margin-top: 14px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .btn-primary { background: linear-gradient(135deg, var(--forest), var(--forest-dark)); color: white; }
  .btn-secondary { background: #f3f4f6; color: #222; border: 1px solid #ccc; font-size: 13px; font-weight: 600; }

  .footnote {
    font-size: 12px; color: #888; text-align: center; margin-top: 18px; line-height: 1.5;
  }

  /* ---- Sovellusnäkymä (kartta) ---- */
  #app { display: none; height: 100%; }
  #map { height: 100%; }

  #status {
    position: absolute; top: 8px; left: 8px; z-index: 1000;
    background: rgba(255,255,255,0.9); padding: 6px 10px; border-radius: 6px;
    font-size: 13px; max-width: 60%;
  }
  .topbar {
    position: absolute; top: 8px; right: 8px; z-index: 1000;
    color: white; padding: 8px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .topbar-dog { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); }
  .topbar-hunter { background: linear-gradient(135deg, var(--forest), var(--forest-dark)); }

  #settingsBtn {
    position: fixed; bottom: 8px; right: 8px; z-index: 1000; padding: 8px 12px;
    background: white; border: 1px solid #ccc; border-radius: 6px; font-size: 12px;
  }
</style>
</head>
<body>

  <div id="onboarding"></div>

  <div id="app">
    <div id="topbar" class="topbar"></div>
    <div id="status">Ladataan...</div>
    <div id="map"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</body>
</html>
