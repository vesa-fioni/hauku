<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png?v=2">
<title>Hauku</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --forest: #1b4332;
    --forest-dark: #10291f;
    --orange: #f97316;
    --orange-dark: #ea6a0a;
    --cream: #f7f5f0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--cream);
    color: #222;
  }

  /* ---- Onboarding / asetukset ---- */
  #onboarding, .overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: var(--cream);
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 24px 16px 40px;
  }
  .overlay { background: rgba(0,0,0,0.5); padding-top: 40px; }
  .overlay .onboard-card { box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

  .onboard-card {
    width: 100%; max-width: 420px;
    background: var(--cream);
  }
  .overlay .onboard-card { background: white; border-radius: 16px; padding: 20px; }

  .onboard-logo { width: 100%; max-width: 300px; display: block; margin: 0 auto 6px; }
  .onboard-tagline {
    text-align: center; color: var(--forest); font-weight: 600;
    font-size: 14px; margin: 0 0 18px;
  }

  .form-block {
    background: white; border-radius: 14px; padding: 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .overlay .form-block { box-shadow: none; padding: 0; margin-top: 4px; }

  .form-block label {
    display: block; font-size: 12px; color: #555; margin: 12px 0 4px;
  }
  .form-block label:first-child { margin-top: 0; }
  .form-block input {
    width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px;
  }

  .role-toggle { display: flex; gap: 10px; }
  .role-option {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px;
    cursor: pointer;
  }

  .hint { font-size: 12px; color: #888; margin: 6px 0; }
  .hint-ok { color: #16a34a; }

  .btn {
    width: 100%; padding: 14px; margin-top: 14px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .btn-primary { background: linear-gradient(135deg, var(--forest), var(--forest-dark)); color: white; }
  .btn-secondary { background: #f3f4f6; color: #222; border: 1px solid #ccc; font-size: 13px; font-weight: 600; }

  .footnote {
    font-size: 12px; color: #888; text-align: center; margin-top: 18px; line-height: 1.5;
  }

  /* ---- Sovellusnäkymä (kartta) ---- */
  #app { display: none; height: 100%; flex-direction: column; }

  #appHeader {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    z-index: 1500;
  }
  #appHeader img { height: 32px; flex-shrink: 0; }

  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-version { font-size: 11px; color: #bbb; font-weight: 600; }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .header-group {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 700; color: #222;
  }
  .topbar-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }

  #settingsBtn {
    background: none; border: none; padding: 4px;
    font-size: 22px; line-height: 1; cursor: pointer; color: var(--forest);
  }

  #mapWrap { position: relative; flex: 1 1 auto; min-height: 0; }
  #map { height: 100%; }

  #status {
    position: absolute; top: 8px; left: 8px; z-index: 1000;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.9); padding: 6px 10px; border-radius: 6px;
    font-size: 13px; max-width: 80%;
  }
  #pauseBtn {
    flex-shrink: 0;
    background: var(--forest); color: white; border: none;
    padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }

  .marker-label {
    background: rgba(255,255,255,0.95);
    border: none;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: 600;
    color: #222;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .marker-label::before { display: none; } /* piilota Leafletin oletusnuoli */
</style>
</head>
<body>

  <div id="onboarding"></div>

  <div id="app">
    <div id="appHeader">
      <div class="header-left">
        <img src="logo.png?v=2" alt="Hauku">
        <span id="appVersion" class="header-version"></span>
      </div>
      <div class="header-right">
        <span class="header-group">
          <span id="headerRoleDot" class="topbar-dot"></span>
          <span id="headerGroupText"></span>
        </span>
        <button id="settingsBtn" aria-label="Asetukset">&#9776;</button>
      </div>
    </div>
    <div id="mapWrap">
      <div id="status">
        <span id="statusText">Ladataan...</span>
        <button id="pauseBtn">Pysäytä</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="shared.js?v=19"></script>
</body>
</html>
